#
# Picom config

# add rounded corners to everything except polybar
corner-radius = 10.0;
rounded-corners-exclude = [
  "class_g = 'Polybar'"
];

round-borders = 1;

# transparency
opacity-rule = [
	"95:class_g = 'kitty' && focused",
	"90:class_g = 'kitty' && !focused"
]
# inactive-dim = 0.1;


# make stuff fade in and out
fading = true;
# unredir-if-possible = false;
fade-delta=3;
#fade-in-step = 0.2;
#fade-out-step = 0.2;

# nice kawase blur dual_kawase
blur: {
  method = "none";
  strength = 6;
  background = false;
  background-frame = false;
  background-fixed = false;
}

# glx gave me the least tearing
backend = "glx";

# a little vsync always hurt everyone
vsync = false;

# a few defaults, i just left them there
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-client-opacity = true;
detect-client-leader = true

wintypes:
{
  tooltip = { fade = true; shadow = false; focus = true; full-shadow = false; };
  dnd = { shadow = false; }
};

